[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pocket-othello-engine"
version = "0.2.0"
description = "Othello rules and compact PyTorch Dueling Double-DQN components"
requires-python = ">=3.10"

[project.optional-dependencies]
dqn = ["torch>=2.0,<3"]

[tool.setuptools.packages.find]
where = ["."]
include = ["othello*", "dqn*"]
