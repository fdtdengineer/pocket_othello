[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pocket-othello-engine"
version = "0.1.0"
description = "Pure-Python Othello rules and future PyTorch DQN components"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
where = ["."]
include = ["othello*"]
