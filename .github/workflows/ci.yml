name: Engine checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install browser dependencies
        run: npm install --no-audit --no-fund

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run JavaScript and Python rules tests
        run: npm test

      - name: Install CPU PyTorch and Python engine
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e engine/python --no-deps

      - name: Run Dueling Double-DQN tests
        run: npm run test:dqn

      - name: Generate and validate teacher data
        run: npm run test:teacher

      - name: Run imitation pretraining smoke test
        run: npm run test:imitation

      - name: Run mixed-opponent reinforcement smoke test
        run: npm run test:reinforcement

      - name: Install ONNX validation dependencies
        run: python -m pip install numpy onnx onnxruntime

      - name: Export and validate ONNX model
        run: npm run test:onnx

      - name: Run ONNX Runtime Web inference
        run: |
          python engine/python/tests/create_browser_fixture.py /tmp/othello_dqn.onnx
          npm run test:ort-web -- /tmp/othello_dqn.onnx

      - name: Prepare static ONNX Runtime assets
        run: |
          npm run prepare:web -- --output /tmp/onnxruntime-web
          test -f /tmp/onnxruntime-web/ort.wasm.bundle.min.mjs
          test -f /tmp/onnxruntime-web/ort-wasm-simd-threaded.wasm
          test -f /tmp/onnxruntime-web/manifest.json

      - name: Check JavaScript syntax
        run: npm run check
